user_language: fr
llm:
  extraction:
    model: openai/gpt-oss-20b
    temperature: 0
    max_retries: 3
    timeout: 60
    api_base: http://192.168.0.78:1234/v1
  arbitration:
    model: openai/gpt-oss-20b
    temperature: 0
    max_retries: 2
    timeout: 30
    api_base: http://192.168.0.78:1234/v1
  context:
    model: openai/gpt-oss-20b
    temperature: 0.3
    max_retries: 2
    timeout: 60
    api_base: http://192.168.0.78:1234/v1
  consolidation:
    model: openai/gpt-oss-20b
    temperature: 0.1
    api_base: http://192.168.0.78:1234/v1
embeddings:
  provider: openai
  model: text-embedding-nomic-embed-text-v2
  chunk_size: 400
  chunk_overlap: 80
  api_base: http://192.168.0.78:1234/v1
memory:
  path: ./memory
  context_max_tokens: 3000
  context_budget:
    identity: 10
    top_of_mind: 25
    vigilances: 15
    boost: 10
    work: 10
    projects: 10
    ai_instructions: 15
    close_ones: 5
scoring:
  model: act_r
  decay_factor: 0.5
  decay_factor_short_term: 0.8
  importance_weight: 0.3
  spreading_weight: 0.2
  permanent_min_score: 0.5
  relation_strength_base: 0.5
  relation_decay_halflife: 180
  window_size: 50
  min_score_for_context: 0.3
  # Legacy (used until Phase 2 replaces scoring.py)
  weight_importance: 0.4
  weight_frequency: 0.3
  weight_recency: 0.3
  frequency_cap: 20
  recency_halflife_days: 30
job:
  schedule: 0 3 * * *
  idle_trigger_minutes: 10
  max_chats_per_run: 20
faiss:
  index_path: ./memory/_memory.faiss
  mapping_path: ./memory/_memory.pkl
  manifest_path: ./memory/_faiss_manifest.json
  top_k: 5
mcp:
  transport: stdio          # recommended default; use --transport sse for LAN
  host: 0.0.0.0             # SSE bind address (only used when transport=sse)
  port: 8765                # SSE port (only used when transport=sse)
prompts:
  path: ./prompts
features:
  doc_pipeline: true
ingest:
  recovery_threshold_seconds: 300
  max_retries: 3
  jobs_path: ./memory/_ingest_jobs.json
categories:
  observations:
  - fact
  - preference
  - diagnosis
  - treatment
  - progression
  - technique
  - vigilance
  - decision
  - emotion
  - interpersonal
  - skill
  - project
  - context
  - rule
  entity_types:
  - person
  - health
  - work
  - project
  - interest
  - place
  - animal
  - organization
  relation_types:
  - affects
  - improves
  - worsens
  - requires
  - linked_to
  - lives_with
  - works_at
  - parent_of
  - friend_of
  - uses
  - part_of
  - contrasts_with
  - precedes
  folders:
    person: close_ones
    health: self
    work: work
    project: projects
    interest: interests
    place: interests
    animal: close_ones
    organization: work
